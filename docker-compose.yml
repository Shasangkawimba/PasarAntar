version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pasar_antar_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-pasar_antar}
      POSTGRES_USER: ${DB_USERNAME:-pasar_antar_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pasar_antar_password}
    ports:
      - "${FORWARD_DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pasar_antar

  redis:
    image: redis:7-alpine
    container_name: pasar_antar_redis
    restart: unless-stopped
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pasar_antar

networks:
  pasar_antar:
    driver: bridge

volumes:
  pgdata:
  redisdata:
